// Scale the answer list so every question+answer fits on one screen with
// no scrolling and as little empty space as possible.
function fitAnswers() {
  const box = main.querySelector(".qa-list");
  if (!box) return;
  const ol = box.querySelector("ol");
  if (!ol) return;

  const fits = () =>
    ol.scrollHeight <= box.clientHeight && ol.scrollWidth <= box.clientWidth;

  const MIN = 14, MAX = 64;
  // Binary search for the largest base font-size that still fits.
  let lo = MIN, hi = MAX, best = MIN;
  for (let i = 0; i < 18; i++) {
    const mid = (lo + hi) / 2;
    box.style.fontSize = mid + "px";
    if (fits()) { best = mid; lo = mid; }
    else { hi = mid; }
  }
  box.style.fontSize = best + "px";
}

// Scale the question text so it fills the big question box (large font for short
// questions, smaller for long ones) — keeps the box from looking empty.
function fitQuestion() {
  const box = main.querySelector(".q-text");
  if (!box) return;
  const body = box.querySelector(".q-text-body");
  if (!body) return;
  const cs = getComputedStyle(box);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const fits = () =>
    body.scrollWidth <= (box.clientWidth - padX) + 1 &&
    body.scrollHeight <= (box.clientHeight - padY) + 1;

  const MIN = 10, MAX = 240;   // low floor so the text always shrinks to fit the box (matches the builder)
  let lo = MIN, hi = MAX, best = MIN;
  for (let i = 0; i < 22; i++) {
    const mid = (lo + hi) / 2;
    box.style.fontSize = mid + "px";
    if (fits()) { best = mid; lo = mid; } else { hi = mid; }
  }
  box.style.fontSize = best + "px";
}

function viewEnd() {
  main.innerHTML = `
    <div class="view end">
      <h2>THANKS FOR PLAYING!</h2>
      <p>Hope you enjoyed Pluckers Trivia.<br/>Highest score wins — see your server for prizes.</p>
      <div class="btn-row">
        <button class="btn" id="againBtn">PLAY AGAIN</button>
      </div>
    </div>
  `;
  document.getElementById("againBtn").addEventListener("click", () => {
    game.state = State.TITLE;
    game.roundIdx = 0;
    game.questionIdx = 0;
    render();
  });
}

function render() {
  if (live.role === "player") { renderPlayer(); return; }   // phones get the player UI, never the host/TV views
  renderMeta();
  switch (game.state) {
    case State.TITLE: viewTitle(); break;
    case State.ROUND_INTRO: viewRoundIntro(); break;
    case State.QUESTION: viewQuestion(); break;
    case State.TURN_IN: viewTurnIn(); break;
    case State.ANSWER: viewAnswer(); break;
    case State.FINAL_BOARD: viewFinalBoard(); break;
    case State.WINNER: viewWinner(); break;
    case State.ROUND_END: viewRoundEnd(); break;
    case State.END: viewEnd(); break;
  }
  // Apply this screen's background + fonts (a design can set different ones per screen).
  applyScreenStyle(designScreenKey());
  // If we're hosting a live session, broadcast the new state to all displays.
  if (live.role === "host" && !live.applying) pushState();
  // On TV displays, show/hide the injected instructions + QR per screen.
  updateTvChromeVisibility();
  // Draw any freeform custom text/image elements on top of this screen.
  renderDesignOverlay();
  // Apply any custom positions the host dragged for the built-in elements.
  applyBuiltinSlots();
  // Box stays the size the host set — re-fit the question text into it (every
  // question, after the box's final size/position is applied).
  if (game.state === State.QUESTION) fitQuestion();
  // Phone version: keep the top-right join QR in sync with the current screen.
  renderJoinQr();
  // Refresh the host's "players joined / answered" tracker for this screen.
  if (live.role === "host") updatePlayerTracker();
}
// When a design has "slots" for a screen, the built-in elements (badge, category,
// question box, howto) are positioned freely (% of the 1920×1080 stage) instead of
// the default layout. position:fixed resolves to #app (it has a transform), so % =
// stage %, matching the editor.
function applyBuiltinSlots() {
  if (!DESIGN || !DESIGN.slots) return;
  const sl = DESIGN.slots[designScreenKey()];
  if (!sl) return;
  const map = { logo: ".q-corner-logo", badge: ".q-badge", category: ".q-category", box: ".q-text, .ans-q", howto: ".q-howto", answer: ".ans-a", score: ".q-score", next: "#qNextBtn", hint: ".q-screen .hint",
    fbtitle: ".fb-title", fbmsg: ".fb-empty", fbbtn: ".final-board .btn-row", fbhint: ".final-board .hint",
    winburst: ".win-burst, .champ-crown", winlabel: ".win-label", winname: ".win-name", winbtn: ".winner-screen .btn-row" };
  Object.keys(map).forEach(name => {
    const el = document.querySelector(map[name]); const s = sl[name];
    if (!el || !s) return;
    el.style.position = "fixed";
    el.style.left = s.x + "%"; el.style.top = s.y + "%";
    el.style.margin = "0"; el.style.flex = "none";
    if (name === "box") {
      // The question box is a sized container; fitQuestion() auto-fits the text inside.
      if (s.w != null) el.style.width = s.w + "%";
      if (s.h != null) el.style.height = s.h + "%";
    } else if (s.s != null) {
      // Text pills + logo keep their CONTENT size (text stays inside) and only scale —
      // never force a w/h that could clip the text.
      el.style.transform = "scale(" + s.s + ")"; el.style.transformOrigin = "top left";
    }
  });
}

// The element that hosts all on-screen UI (the scaled 1920×1080 stage). Overlays
// (live banner, room tag, leaderboard takeover) are appended here, not to <body>,
// so they scale and position with everything else.
function stageEl() { return document.getElementById("app") || document.body; }

// Scale the 1920×1080 stage to fit the current screen — keeps the layout identical
// (and overlap-free) on a laptop, a 1080p TV, or a 720p TV.
function fitStage() {
  const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  document.documentElement.style.setProperty("--scale", String(s));
}
window.addEventListener("resize", fitStage);
window.addEventListener("orientationchange", fitStage);
fitStage();

// Re-fit the answer list / question text when the window/preview is resized.
window.addEventListener("resize", () => {
  if (game.state === State.ROUND_END) fitAnswers();
  if (game.state === State.QUESTION) fitQuestion();
});
// Re-fit once the custom web font has loaded (its metrics differ from the fallback).
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    if (game.state === State.QUESTION) fitQuestion();
    if (game.state === State.ROUND_END) fitAnswers();
  });
}

function advance() {
  if (live.role === "display") return;   // mirroring screens are view-only
  gotoCursor(game.cursor + 1);
}

function goBack() {
  if (live.role === "display") return;   // mirroring screens are view-only
  gotoCursor(game.cursor - 1);
}

function backToMenu() {
  if (confirm("Return to title screen? Progress will be lost.")) {
    gotoCursor(0);
  }
}

// INPUT
// ============================================================
document.addEventListener("keydown", (e) => {
  if (e.repeat) return;
  // Let typing flow normally into form fields (e.g. the TV code box).
  if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
  if (document.getElementById("loadModal")) {
    if (e.key === "Escape") {
      e.preventDefault();
      closeLoadModal();
    }
    return;
  }
  // On any TV / display screen, the only key that does anything is fullscreen.
  if (document.body.classList.contains("display-mode")) {
    if (e.key === "f" || e.key === "F") { e.preventDefault(); toggleFullscreen(); }
    return;
  }
  switch (e.key) {
    case " ":
    case "ArrowRight":
    case "Enter":
      e.preventDefault();
      advance();
      break;
    case "ArrowLeft":
      e.preventDefault();
      goBack();
      break;
    case "f":
    case "F":
      e.preventDefault();
      toggleFullscreen();
      break;
    case "l":
    case "L":
      if (game.state === State.TITLE) {
        e.preventDefault();
        openLoadModal();
      }
      break;
    case "Escape":
      e.preventDefault();
      if (game.state !== State.TITLE) backToMenu();
      break;
  }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
  }
}

// QUESTION LOADING / UPLOAD
// ============================================================
function loadRounds() {
  try {
    const raw = localStorage.getItem("pluckers-trivia-rounds");
    if (!raw) return DEFAULT_ROUNDS;
    const parsed = JSON.parse(raw);
    if (validateRounds(parsed)) return normalizeRounds(parsed);
  } catch (e) { /* fall through */ }
  return DEFAULT_ROUNDS;
}

function saveRounds(rounds) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rounds));
}

function clearStoredRounds() {
  localStorage.removeItem(STORAGE_KEY);
}

// Internal shape: { category, questions: [{q, a}] }
function validateRounds(data) {
  if (!Array.isArray(data) || data.length === 0) {
    throw new Error("Must be a non-empty list of categories.");
  }
  for (let i = 0; i < data.length; i++) {
    const r = data[i];
    if (!r || typeof r.category !== "string" || !r.category.trim()) {
      throw new Error(`Category ${i + 1}: missing or empty 'category' name.`);
    }
    if (!Array.isArray(r.questions) || r.questions.length === 0) {
      throw new Error(`Category "${r.category}": needs at least one question.`);
    }
    for (let j = 0; j < r.questions.length; j++) {
      const q = r.questions[j];
      if (typeof q === "string") {
        if (!q.trim()) throw new Error(`Category "${r.category}", question ${j + 1}: empty.`);
      } else if (q && typeof q === "object") {
        if (typeof q.q !== "string" || !q.q.trim()) {
          throw new Error(`Category "${r.category}", question ${j + 1}: missing 'q' text.`);
        }
        if (q.a !== undefined && q.a !== null && typeof q.a !== "string") {
          throw new Error(`Category "${r.category}", question ${j + 1}: 'a' must be a string.`);
        }
      } else {
        throw new Error(`Category "${r.category}", question ${j + 1}: must be a string or {q, a} object.`);
      }
    }
  }
  return true;
}

function normalizeRounds(data) {
  return data.map(r => ({
    category: r.category.trim(),
    questions: r.questions.map(q => {
      if (typeof q === "string") return { q: q.trim(), a: "" };
      return { q: (q.q || "").trim(), a: (q.a || "").trim() };
    })
  }));
}

function parseJsonRounds(text) {
  const parsed = JSON.parse(text);
  validateRounds(parsed);
  return normalizeRounds(parsed);
}

// Text format:
//   ## Category Name
//   Question 1? | Answer
//   Question 2? | Answer
//
//   ## Next Category
//   ...
// The "| Answer" portion is optional. " | " or " :: " both work as separators.
function parseTextRounds(text) {
  const lines = text.split(/\r?\n/);
  const rounds = [];
  let current = null;
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    const catMatch = line.match(/^#{1,3}\s*(.+)$/);
    if (catMatch) {
      current = { category: catMatch[1].trim(), questions: [] };
      rounds.push(current);
    } else {
      if (!current) {
        throw new Error("Text must start with a category header (e.g. '## Sports') before any questions.");
      }
      // Split question/answer on " | " (preferred) or " :: "
      let q = line, a = "";
      const sepMatch = line.match(/^(.*?)\s*(?:\||::)\s*(.+)$/);
      if (sepMatch) {
        q = sepMatch[1].trim();
        a = sepMatch[2].trim();
      }
      current.questions.push({ q, a });
    }
  }
  validateRounds(rounds);
  return normalizeRounds(rounds);
}

// CSV format (one question per row):
//   Category,Question,Answer
//   Sports,How many players on a soccer team?,11
//   Sports,"What sport uses ""love"" for zero?",Tennis
// A header row (Category/Question/Answer) is optional and auto-detected.
// Rows are grouped into categories in the order they first appear. Answer is optional.
function parseCsvCells(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }   // escaped quote ""
        else inQuotes = false;
      } else { field += c; }
    } else if (c === '"') {
      inQuotes = true;
    } else if (c === ",") {
      row.push(field); field = "";
    } else if (c === "\r") {
      // ignore — newline handled on \n
    } else if (c === "\n") {
      row.push(field); rows.push(row); row = []; field = "";
    } else {
      field += c;
    }
  }
  row.push(field); rows.push(row);
  // Drop rows that are completely empty.
  return rows.filter(r => r.some(c => c.trim() !== ""));
}

function parseCsvRounds(text) {
  const rows = parseCsvCells(text);
  if (!rows.length) throw new Error("The CSV is empty.");
  // Auto-detect and skip a header row.
  let start = 0;
  const first = rows[0].map(s => s.trim().toLowerCase());
  if (first.some(h => /^(category|categories|cat|question|questions|q|answer|answers|a)$/.test(h))) start = 1;
  const byCat = new Map();
  const order = [];
  for (let i = start; i < rows.length; i++) {
    const r = rows[i];
    const category = (r[0] || "").trim();
    const q = (r[1] || "").trim();
    const a = (r[2] || "").trim();
    if (!category && !q) continue;             // blank line
    if (!category) throw new Error("Row " + (i + 1) + ': needs a category in the first column.');
    if (!q) continue;                          // category but no question — skip the row
    if (!byCat.has(category)) { byCat.set(category, []); order.push(category); }
    byCat.get(category).push({ q, a });
  }
  const rounds = order.map(cat => ({ category: cat, questions: byCat.get(cat) }));
  validateRounds(rounds);
  return normalizeRounds(rounds);
}

function applyRounds(rounds) {
  saveRounds(rounds);
  ROUNDS = rounds;
  buildSchedule();
  gotoCursor(0);   // back to the title with the new question set
}

function templateJson() {
  return JSON.stringify(DEFAULT_ROUNDS.slice(0, 1).map(r => ({
    category: r.category,
    questions: r.questions.slice(0, 3)
  })), null, 2);
}
function templateText() {
  return "## Food & Drink\nThe Scoville scale measures what property of food?\nWhich country is credited with inventing pizza?\n\n## Sports\nHow many players are on the field per team in soccer?\nWhat sport uses the term 'love' to mean zero?";
}

let modalFormat = "build"; // "build" | "text" | "json"
let BUILDER_DATA = null;   // [{category, questions:[{q,a}]}] — the in-menu sheet builder state

// ---- BUILD-YOUR-OWN sheet (set # of categories & questions, type them in) ----
function blankQ() { return { q: "", a: "" }; }
function clampInt(v, lo, hi) { let n = parseInt(v, 10); if (isNaN(n)) n = lo; return Math.max(lo, Math.min(hi, n)); }

function seedBuilderData() {
  // Seed from the questions currently in play so the host can tweak them,
  // falling back to the built-in defaults.
  const src = (ROUNDS && ROUNDS.length) ? ROUNDS : DEFAULT_ROUNDS;
  BUILDER_DATA = src.map(r => ({
    category: r.category || "",
    questions: (r.questions || []).map(q => ({ q: q.q || "", a: q.a || "" }))
  }));
  if (!BUILDER_DATA.length) BUILDER_DATA = [{ category: "", questions: [blankQ()] }];
}

// Read the live grid inputs back into BUILDER_DATA (so edits survive a resize/apply).
function readBuilderDOM() {
  const grid = document.getElementById("builderGrid");
  if (!grid) return;
  BUILDER_DATA = [...grid.querySelectorAll(".bld-cat")].map(catEl => ({
    category: catEl.querySelector(".bld-catname").value,
    questions: [...catEl.querySelectorAll(".bld-qrow")].map(row => ({
      q: row.querySelector(".bld-q").value,
      a: row.querySelector(".bld-a").value
    }))
  }));
}

function syncCountInputs() {
  const ci = document.getElementById("bldCats"), qi = document.getElementById("bldQs");
  if (!ci || !qi || !BUILDER_DATA) return;
  ci.value = BUILDER_DATA.length || 1;
  qi.value = BUILDER_DATA.reduce((m, c) => Math.max(m, c.questions ? c.questions.length : 0), 0) || 1;
}

// Apply the two number inputs: add/remove categories & question rows, keeping what's there.
function resizeBuilder() {
  readBuilderDOM();
  if (!BUILDER_DATA) BUILDER_DATA = [];
  const nCats = clampInt(document.getElementById("bldCats").value, 1, 40);
  const nQs = clampInt(document.getElementById("bldQs").value, 1, 100);
  document.getElementById("bldCats").value = nCats;
  document.getElementById("bldQs").value = nQs;
  while (BUILDER_DATA.length < nCats) BUILDER_DATA.push({ category: "", questions: [] });
  BUILDER_DATA.length = nCats;
  BUILDER_DATA.forEach(c => {
    if (!c.questions) c.questions = [];
    while (c.questions.length < nQs) c.questions.push(blankQ());
    c.questions.length = nQs;
  });
  renderBuilder();
}

function updateBuilderTotal() {
  const el = document.getElementById("bldTotal");
  if (!el || !BUILDER_DATA) return;
  const cats = BUILDER_DATA.length;
  const total = BUILDER_DATA.reduce((n, c) => n + (c.questions ? c.questions.length : 0), 0);
  el.textContent = "= " + total + " question" + (total === 1 ? "" : "s") + " · " + cats + " categor" + (cats === 1 ? "y" : "ies");
}

function renderBuilder() {
  const grid = document.getElementById("builderGrid");
  if (!grid || !BUILDER_DATA) return;
  grid.innerHTML = BUILDER_DATA.map((c, ci) =>
    '<div class="bld-cat">' +
      '<div class="bld-cat-head">' +
        '<span class="bld-cat-no">CATEGORY ' + (ci + 1) + '</span>' +
        '<input type="text" class="bld-catname" placeholder="Category name (e.g. Sports)" value="' + escapeHtml(c.category) + '" />' +
      '</div>' +
      (c.questions || []).map((q, qi) =>
        '<div class="bld-qrow">' +
          '<span class="bld-qn">' + (qi + 1) + '.</span>' +
          '<input type="text" class="bld-q" placeholder="Question" value="' + escapeHtml(q.q) + '" />' +
          '<input type="text" class="bld-a" placeholder="Answer (optional)" value="' + escapeHtml(q.a) + '" />' +
        '</div>'
      ).join("") +
    '</div>'
  ).join("");
  syncCountInputs();
  updateBuilderTotal();
}

// Turn the grid into a clean rounds array (drops blank rows / empty categories).
function collectBuilderRounds() {
  readBuilderDOM();
  const rounds = (BUILDER_DATA || []).map(c => ({
    category: (c.category || "").trim(),
    questions: (c.questions || [])
      .map(q => ({ q: (q.q || "").trim(), a: (q.a || "").trim() }))
      .filter(q => q.q)
  })).filter(c => c.category || c.questions.length);
  if (!rounds.length) throw new Error("Add at least one category with one question.");
  for (const c of rounds) {
    if (!c.category) throw new Error("Every category needs a name.");
    if (!c.questions.length) throw new Error('Category "' + c.category + '" needs at least one question.');
  }
  return rounds;
}

// Toggle between the builder grid and the upload/paste area based on the active tab.
function setModalMode() {
  const build = modalFormat === "build";
  const ua = document.getElementById("uploadArea");
  const ba = document.getElementById("builderArea");
  const fh = document.getElementById("formatHelp");
  if (ua) ua.style.display = build ? "none" : "";
  if (fh) fh.style.display = build ? "none" : "";
  if (ba) ba.style.display = build ? "" : "none";
  if (build) {
    const grid = document.getElementById("builderGrid");
    if (grid && !grid.children.length) {
      if (!BUILDER_DATA) seedBuilderData();
      renderBuilder();
    }
  }
}

function _colorField(id, label, val) {
  return '<div class="brand-color"><span>' + label + '</span>' +
    '<input type="color" id="' + id + '" value="' + val + '" /></div>';
}
// Read an uploaded image, shrink it to <=maxDim px, return a PNG data URL.
function _downscaleImage(file, maxDim, cb) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const scale = Math.min(1, maxDim / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale));
      h = Math.max(1, Math.round(h * scale));
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      try { cb(c.toDataURL("image/png")); } catch (err) { cb(null); }
    };
    img.onerror = () => cb(null);
    img.src = e.target.result;
  };
  reader.onerror = () => cb(null);
  reader.readAsDataURL(file);
}

async function nqFetchCat(catId, amount, diffParam) {
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  for (let attempt = 0; attempt < 4; attempt++) {
    try {
      const resp = await fetch(`https://opentdb.com/api.php?amount=${amount}&category=${catId}&type=multiple${diffParam}`);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      if (data.response_code === 0) return data.results;
      if (data.response_code === 5 || data.response_code === 1) { await sleep(1800 + 1200 * attempt); continue; }
      throw new Error("API code " + data.response_code);
    } catch (e) { if (attempt === 3) throw e; await sleep(1500); }
  }
  throw new Error("gave up");
}
function parseAILines(text, count) {
  const out = [];
  for (const raw of String(text).split(/\r?\n/)) {
    let line = raw.trim().replace(/^\d+[\.)\]:]\s*/, "").replace(/^[-*•]\s*/, "").replace(/\*\*([^*]+)\*\*/g, "$1").replace(/^Q:\s*/i, "");
    const m = line.match(/^(.*?)\s*(?:\||::|—|–|\s-\s)\s*(.+)$/);
    if (!m) continue;
    const q = m[1].trim(), a = m[2].trim().replace(/^A:\s*/i, "").replace(/^Answer:\s*/i, "");
    if (q && a) out.push({ q, a });
    if (out.length >= count) break;
  }
  return out;
}
async function fetchGeminiTopic(topic, count, apiKey) {
  const prompt = `Generate exactly ${count} distinct, factual trivia questions about "${topic}". Each must have EXACTLY ONE correct answer (no opinions, no "name a..." with many valid answers, no current-events that change). Difficulty: medium. Answers brief (1-4 words). Questions end with "?". Return ONLY a JSON array of ${count} objects with "q" and "a" fields.`;
  const models = ["gemini-2.5-flash-lite", "gemini-2.5-flash", "gemini-2.0-flash-lite", "gemini-2.0-flash"];
  let lastErr = "no models";
  for (const model of models) {
    try {
      const body = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.8, maxOutputTokens: 4096, responseMimeType: "application/json", responseSchema: { type: "ARRAY", items: { type: "OBJECT", properties: { q: { type: "STRING" }, a: { type: "STRING" } }, required: ["q", "a"] } } } };
      if (model.startsWith("gemini-2.5")) body.generationConfig.thinkingConfig = { thinkingBudget: 0 };
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
        method: "POST", headers: { "Content-Type": "application/json", "x-goog-api-key": apiKey }, body: JSON.stringify(body),
      });
      if (!resp.ok) { lastErr = `${model}: HTTP ${resp.status}`; continue; }
      const data = await resp.json();
      const text = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text || "";
      if (!text) { lastErr = `${model}: empty`; continue; }
      let parsed; try { parsed = JSON.parse(text); } catch (e) { const fb = parseAILines(text, count); if (fb.length) return fb; lastErr = `${model}: parse`; continue; }
      if (!Array.isArray(parsed)) { lastErr = `${model}: not array`; continue; }
      const qs = parsed.filter(o => o && typeof o.q === "string" && typeof o.a === "string" && o.q.trim() && o.a.trim()).map(o => ({ q: o.q.trim(), a: o.a.trim() })).slice(0, count);
      if (qs.length >= Math.max(1, Math.floor(count / 2))) return qs;
      lastErr = `${model}: only ${qs.length}/${count}`;
    } catch (e) { lastErr = `${model}: ${e.message}`; }
  }
  throw new Error(lastErr);
}
async function fetchPollinationsTopic(topic, count) {
  const prompt = `Generate exactly ${count} short trivia questions about "${topic}". Each on its own line, format: Question? | Answer. No numbering, no commentary.`;
  const urls = [
    `https://text.pollinations.ai/${encodeURIComponent(prompt)}`,
    `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=mistral`,
    `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai-fast`,
  ];
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  let lastErr = "";
  for (let i = 0; i < urls.length; i++) {
    try {
      const resp = await fetch(urls[i]);
      if (resp.status === 429) { lastErr = "rate-limited"; await sleep(1200 + 600 * i); continue; }
      if (!resp.ok) { lastErr = "HTTP " + resp.status; continue; }
      const qs = parseAILines(await resp.text(), count);
      if (qs.length) return qs;
      lastErr = "no usable lines";
    } catch (e) { lastErr = e.message; }
  }
  throw new Error("AI busy (" + lastErr + ")");
}
async function fetchAITopic(topic, count) {
  let key = ""; try { key = (localStorage.getItem("gemini-key") || DEFAULT_GEMINI_KEY || "").trim(); } catch (e) { key = DEFAULT_GEMINI_KEY; }
  if (key) { try { return await fetchGeminiTopic(topic, count, key); } catch (e) { console.warn("Gemini failed, trying Pollinations:", e.message); } }
  return fetchPollinationsTopic(topic, count);
}
async function runNewQuestions() {
  const msg = document.getElementById("nqMsg");
  const cats = [...newQConfig.categories];
  const customEntries = [...newQConfig.customTopics.entries()];
  const aiTopics = customEntries.filter(([, qs]) => qs === null).map(([t]) => t);
  const ownEntries = customEntries.filter(([, qs]) => Array.isArray(qs));   // your-own-questions categories
  if (!cats.length && !customEntries.length) { if (msg) msg.innerHTML = '<div class="nq-err">Pick at least one category or add a topic.</div>'; return; }
  const go = document.getElementById("nqGo"); if (go) { go.disabled = true; go.textContent = "FETCHING…"; }
  const amount = newQConfig.questionsPerRound;
  const diffParam = newQConfig.difficulty === "any" ? "" : "&difficulty=" + newQConfig.difficulty;
  const decode = s => { const t = document.createElement("textarea"); t.innerHTML = s; return t.value; };
  try {
    const catObjs = cats.map(id => OTDB_CATEGORIES.find(c => c.id === id)).filter(Boolean);
    const otdbP = Promise.all(catObjs.map(c => nqFetchCat(c.id, amount, diffParam)));
    const aiP = Promise.all(aiTopics.map(t => fetchAITopic(t, amount).catch(e => ({ __error: e.message, topic: t }))));
    const [otdb, ai] = await Promise.all([otdbP, aiP]);
    const rounds = [], aiErrors = [];
    catObjs.forEach((c, i) => rounds.push({ category: c.name, questions: otdb[i].map(q => ({ q: decode(q.question), a: decode(q.correct_answer) })) }));
    aiTopics.forEach((t, i) => { const r = ai[i]; if (r && r.__error) { aiErrors.push(`"${t}": ${r.__error}`); return; } rounds.push({ category: t, questions: r }); });
    ownEntries.forEach(([t, qs]) => rounds.push({ category: t, questions: qs.map(x => ({ q: x.q, a: x.a })) }));   // use the host's own questions verbatim
    if (!rounds.length) throw new Error("No questions could be fetched. " + aiErrors.join(" "));
    if (newQConfig.shuffle) rounds.forEach(r => { const a = r.questions; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const tmp = a[i]; a[i] = a[j]; a[j] = tmp; } });
    ROUNDS = rounds; saveRounds(rounds); buildSchedule(); game.cursor = 0; applyFrame(SCHEDULE[0]);
    document.getElementById("modalRoot").innerHTML = "";
    render();
    if (live.role === "host") pushState();   // push the new pack to any live TVs/players
    if (aiErrors.length) console.warn("Some AI topics failed:", aiErrors);
  } catch (e) {
    if (msg) msg.innerHTML = '<div class="nq-err">' + escapeHtml(e.message) + '</div>';
  } finally {
    if (go) { go.disabled = false; go.textContent = "GET QUESTIONS"; }
  }
}

function handleFilePicked(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById("pasteArea").value = ev.target.result;
    if (file.name.toLowerCase().endsWith(".json")) {
      modalFormat = "json";
    } else if (file.name.toLowerCase().endsWith(".csv")) {
      modalFormat = "csv";
    } else if (file.name.toLowerCase().endsWith(".txt")) {
      modalFormat = "text";
    }
    document.querySelectorAll(".format-tab").forEach(t => {
      t.classList.toggle("active", t.dataset.fmt === modalFormat);
    });
    updateFormatHelp();
    setModalMode();
    showModalMsg(`Loaded "${file.name}". Review and click APPLY to use these questions.`, "ok");
  };
  reader.onerror = () => showModalMsg("Could not read that file.", "err");
  reader.readAsText(file);
}

function applyFromModal() {
  if (modalFormat === "build") {
    try {
      const parsed = normalizeRounds(collectBuilderRounds());
      validateRounds(parsed);
      applyRounds(parsed);
      const total = parsed.reduce((n, r) => n + r.questions.length, 0);
      showModalMsg("Built " + parsed.length + " categories, " + total + " questions.", "ok");
      setTimeout(() => { closeLoadModal(); render(); }, 600);
    } catch (err) {
      showModalMsg("Could not build: " + err.message, "err");
    }
    return;
  }
  const text = document.getElementById("pasteArea").value.trim();
  if (!text) {
    showModalMsg("Paste questions or pick a file first.", "err");
    return;
  }
  try {
    let parsed;
    if (modalFormat === "json") {
      parsed = parseJsonRounds(text);
    } else if (modalFormat === "csv") {
      parsed = parseCsvRounds(text);
    } else {
      // Auto-detect JSON if text starts with [
      if (text.startsWith("[")) {
        try { parsed = parseJsonRounds(text); }
        catch { parsed = parseTextRounds(text); }
      } else {
        parsed = parseTextRounds(text);
      }
    }
    applyRounds(parsed);
    const total = parsed.reduce((n, r) => n + r.questions.length, 0);
    showModalMsg(`Loaded ${parsed.length} categories, ${total} questions.`, "ok");
    setTimeout(() => {
      closeLoadModal();
      render();
    }, 600);
  } catch (err) {
    showModalMsg("Could not load: " + err.message, "err");
  }
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ---- Profanity filter -------------------------------------------------------
// Players type TEAM NAMES on their phones that show up on the venue TV + standings,
// so those get masked. (Typed answers are never shown publicly — only the correct
// answer is — so they don't need filtering.) Catches leetspeak ($,0,1,3,@), spacing/
// punctuation, and stretched letters (fuuuck), with whole-word matching to avoid
// false positives like "class" / "cockpit" / "Scunthorpe".
const PROFANITY = ["fuck","motherfucker","fucker","fuckface","fuckwit","fuckhead","shit","bullshit","dumbshit","dipshit","batshit","horseshit","shithead","bitch","bastard","asshole","jackass","dumbass","badass","dickhead","dick","prick","piss","pissed","pussy","cock","cunt","whore","slut","douche","douchebag","wanker","twat","bollocks","bugger","goddamn","jizz","cum","cumshot","blowjob","handjob","dildo","boner","tits","titties","titty","penis","wank","nazi","rape","rapist","molest","nigger","nigga","faggot","fag","retard","retarded","spic","chink","kike","wetback","tranny","dyke","coon","gook","beaner"]
  .map(w => _normWord(w));
// Words too easily embedded in innocent words → don't match when buried inside another
// word (e.g. "rapist" in "therapist", "prick" in "prickly"); plural/suffix forms still match.
const PROFANITY_NO_CONTAINS = new Set(["cock","cunt","shit","dick","rape","rapist","piss","cum","fag","prick"].map(w => _normWord(w)));
// Even suffix matching causes false positives for these (spic→spicy/spice, coon→raccoon),
// so only flag them as an exact standalone word.
const PROFANITY_EXACT = new Set(["spic","coon","gook","kike"].map(w => _normWord(w)));
const PROF_SUFFIX = /^(s|es|ed|er|ers|in|ing|y|ies|ty|z|hole|holes|head|heads|face|faces|wad|bag|tard|tards|ster|ish)$/;
function _normWord(t) {
  return String(t).toLowerCase()
    .replace(/[@4]/g, "a").replace(/[\$5]/g, "s").replace(/0/g, "o").replace(/[1!|]/g, "i").replace(/3/g, "e").replace(/7/g, "t")
    .replace(/[^a-z]/g, "")
    .replace(/(.)\1+/g, "$1");   // collapse repeated letters so "fuuuck" == "fuck"
}
function _tokenIsProfane(tok) {
  const n = _normWord(tok);
  if (!n) return false;
  for (let i = 0; i < PROFANITY.length; i++) {
    const w = PROFANITY[i];
    if (n === w) return true;
    if (PROFANITY_EXACT.has(w)) continue;   // exact-only words: skip suffix + embedded matching
    if (n.length > w.length && n.startsWith(w) && PROF_SUFFIX.test(n.slice(w.length))) return true;   // plurals/suffixes
    if (w.length >= 4 && !PROFANITY_NO_CONTAINS.has(w) && n.indexOf(w) !== -1) return true;            // embedded (e.g. "fuckyou")
  }
  return false;
}
// Mask any profane word inside a string; safe to call on every team name.
function cleanProfanity(text) {
  const s = String(text == null ? "" : text);
  if (!s.trim()) return s;
  return s.replace(/\S+/g, tok => _tokenIsProfane(tok) ? "*".repeat(tok.length) : tok);
}

// Make a near-white background in the logo transparent at runtime, so the logo
// floats on the page with no white box even if the PNG isn't transparent.
// (Works when the page is served over http — Netlify or a localhost preview.
//  Over file:// the browser blocks reading the pixels, so it leaves it as-is.)
function deWhiteLogo(img) {
  if (!img || img.dataset.dewhited || !img.naturalWidth) return;
  try {
    const c = document.createElement("canvas");
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    const ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0);
    const px = ctx.getImageData(0, 0, c.width, c.height);
    const d = px.data;
    for (let i = 0; i < d.length; i += 4) {
      // Only knock out pixels that are essentially white (keeps yellow/red/blue).
      if (d[i] > 238 && d[i + 1] > 238 && d[i + 2] > 238) d[i + 3] = 0;
    }
    ctx.putImageData(px, 0, 0);
    img.dataset.dewhited = "1";
    img.src = c.toDataURL("image/png");
  } catch (e) {
    /* file:// or cross-origin — leave the logo untouched */
  }
}
function processLogos() {
  document.querySelectorAll(".brand-logo-img, .title-logo-img").forEach((im) => {
    if (im.dataset.dewhited) return;
    // Only auto-knock-out white on the built-in logo. Custom brand logos are left
    // exactly as uploaded (their white may be intentional, e.g. white lettering).
    if (!/pluckers-logo/.test(im.getAttribute("src") || "")) return;
    if (im.complete && im.naturalWidth) deWhiteLogo(im);
    else im.addEventListener("load", () => deWhiteLogo(im), { once: true });
  });
}

function liveConfigured() {

function liveClient() {

  return live.sb;
}
// Fresh, unique room code per session so several locations never collide.
function makeRoomCode() {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // no ambiguous 0/O/1/I/L
  let s = "";
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
// Permanent link to bookmark on every TV; it shows an "enter code" screen.
function tvBaseUrl() {
  return location.origin + location.pathname + "?tv";
}
// Direct-connect link for the current room (used by the QR / scan-to-watch).
function tvUrl() {
  return tvBaseUrl() + "&room=" + encodeURIComponent(live.code || "");
}
// Link players open on their phones (from the "scan to play" QR) to join + answer.
function playUrl() {
  return location.origin + location.pathname + "?play=" + encodeURIComponent(live.code || "");
}
// A URL a phone on another device can't reach (running off your PC, not the web).
function isLocalUrl() {
  const h = location.hostname;
  return location.protocol === "file:" ||
         h === "localhost" || h === "127.0.0.1" || h === "" ||
         h.endsWith(".local") || /^192\.168\./.test(h) || /^10\./.test(h);
}
// A lightweight copy of the theme for LIVE sync — strips the heavy embedded assets
// (uploaded fonts, logo/background data-URLs) that would bloat every state push and
// time out the write. TVs load those full assets from the design link (designId).
function liteTheme() {
  const t = Object.assign({}, THEME);
  delete t.fontFaces;
  if (/^data:/.test(t.logo || "")) t.logo = "";
  if (/^data:/.test(t.bgimg || "")) t.bgimg = "";
  if (t.screens) { const sc = {}; Object.keys(t.screens).forEach(k => { const s = Object.assign({}, t.screens[k] || {}); if (/^data:/.test(s.bgimg || "")) s.bgimg = ""; sc[k] = s; }); t.screens = sc; }
  return t;
}
function snapshot() {
  return {
    room_code: live.code,

    state: JSON.stringify({ st: game.state, timerSecs: TIMER_SECS, timerEnd: TIMER_END, lb: { shown: LB_SHOWN, teams: TEAMS }, theme: liteTheme(), designId: LIVE_DESIGN_ID }),
    round_idx: game.roundIdx,   // cosmetic

  TIMER_END = 0;
  game.cursor = 0;

  if (typeof hostPlayers === "object" && hostPlayers) Object.keys(hostPlayers).forEach(k => delete hostPlayers[k]);
  if (typeof lastStandingsKey !== "undefined") lastStandingsKey = "";
  try { localStorage.removeItem(TEAMS_KEY); } catch (e) {}

}

async function goLiveSubmit() {
  const nameEl = document.getElementById("glName");

  const name = ((nameEl && nameEl.value) || "").trim().toUpperCase().replace(/\s+/g, " ");

  const res = await startHosting(name);

    if (nameEl) nameEl.focus();

// Reserve the name (no duplicates while live), start hosting, begin the heartbeat.
// Returns { ok:true } or { ok:false, reason }.
async function startHosting(name) {
  // A name is taken only while a host keeps it fresh (within LIVE_TTL_MS); stale = free.
  try {
    const { data } = await liveClient().from(LIVE_TABLE).select("updated_at").eq("room_code", name).maybeSingle();
    const inUse = data && data.updated_at && (Date.now() - Date.parse(data.updated_at) < LIVE_TTL_MS);
    if (inUse) return { ok: false, reason: '"' + name + '" is already live right now. Pick another name (or end that game first).' };
  } catch (e) { /* if the check fails, fall through and host anyway */ }

  live.role = "host";
  live.code = name;
  game.cursor = 0;
  applyFrame(SCHEDULE[0]);
  try { localStorage.setItem(LOC_NAME_KEY, name); } catch (e) {}
  try { await liveClient().from(LIVE_TABLE).upsert(snapshot()); } catch (e) {}
  rememberHostSession();
  startHeartbeat();
  render();                 // render() keeps pushing state to this room while hosting
  showNamedRoomBanner(name);
  return { ok: true };
}

// Keep this game's name "in use" while it's live, so the uniqueness check sees it.

      try { liveClient().from(LIVE_TABLE).update({ updated_at: new Date().toISOString() }).eq("room_code", live.code); } catch (e) {}

  stopHeartbeat();
  if (live.tvWatch) { clearInterval(live.tvWatch); live.tvWatch = null; }
  live.tvWin = null;
  if (code) {
    // Stamp it far in the past → instantly "stale" → the name is available again.
    try { liveClient().from(LIVE_TABLE).update({ updated_at: new Date(0).toISOString() }).eq("room_code", code); } catch (e) {}
  }
  if (live.channel && live.sb) { try { live.sb.removeChannel(live.channel); } catch (e) {} }
  live.role = "off"; live.code = null; live.channel = null;
  try { localStorage.removeItem(HOST_RESUME_KEY); } catch (e) {}
  const el = document.getElementById("liveBanner");
  if (el) el.remove();
  resetHostSession();   // clean slate for the next game (no leftover teams/timer)
  render();
}

// (legacy) direct-host a fixed named room from a ?room=NAME URL.
async function autoHost(roomName) {
  live.code = roomName;
  if (!liveConfigured()) { render(); return; }   // still plays locally if Supabase is off
  live.role = "host";
  try {
    const { data } = await liveClient().from(LIVE_TABLE).select("*").eq("room_code", roomName).maybeSingle();
    const recent = data && data.updated_at && (Date.now() - Date.parse(data.updated_at) < 8 * 3600 * 1000);
    if (recent) {
      if (Array.isArray(data.rounds) && data.rounds.length) { ROUNDS = data.rounds; buildSchedule(); }
      try { const ex = JSON.parse(data.state); if (typeof ex.timerSecs === "number") TIMER_SECS = ex.timerSecs; } catch (e) {}
      game.cursor = Math.max(0, Math.min((data.question_idx | 0), SCHEDULE.length - 1));
      applyFrame(SCHEDULE[game.cursor]);
    }
    await liveClient().from(LIVE_TABLE).upsert(snapshot());
  } catch (e) {}
  rememberHostSession();
  startHeartbeat();
  render();
  showNamedRoomBanner(roomName);
}

// Small "live" indicator for a named-room host (no code / no QR — the TVs use the URL).
function showNamedRoomBanner(roomName) {
  let el = document.getElementById("liveBanner");

// Save the active hosted room so a refresh/crash can pick it back up.
function rememberHostSession() {
  try { localStorage.setItem(HOST_RESUME_KEY, JSON.stringify({ code: live.code, t: Date.now() })); } catch (e) {}
}

// On load, if this computer was recently hosting a room, rejoin it as host and
// resume exactly where the game left off (read straight from Supabase).
async function resumeHostIfAny() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(HOST_RESUME_KEY)); } catch (e) {}
  // Only auto-resume a recent session (within 8 hours) to avoid stale rooms.
  if (!saved || !saved.code || !liveConfigured() || (Date.now() - (saved.t || 0)) > 8 * 3600 * 1000) {
    render();
    return;
  }
  try {
    const { data } = await liveClient().from(LIVE_TABLE).select("*").eq("room_code", saved.code).maybeSingle();
    if (!data) { render(); return; }
    live.role = "host";
    live.code = saved.code;
    // restore the exact position + questions + timer
    if (Array.isArray(data.rounds) && data.rounds.length) { ROUNDS = data.rounds; buildSchedule(); }
    try {
      const ex = JSON.parse(data.state);
      if (typeof ex.timerSecs === "number") TIMER_SECS = ex.timerSecs;
    } catch (e) {}
    game.cursor = Math.max(0, Math.min((data.question_idx | 0), SCHEDULE.length - 1));
    applyFrame(SCHEDULE[game.cursor]);
    rememberHostSession();
    render();
    showLiveBanner();
  } catch (e) {
    render();
  }
}

async function pushState() {
  if (live.role !== "host" || !live.code) return;
  try {
    await liveClient().from(LIVE_TABLE).upsert(snapshot());
  } catch (e) { /* a dropped update will be corrected by the next one */ }
}

function stopLive() {
  if (live.channel && live.sb) live.sb.removeChannel(live.channel);
  live.role = "off"; live.code = null; live.channel = null;
  try { localStorage.removeItem(HOST_RESUME_KEY); } catch (e) {}   // don't auto-resume after an intentional stop
  const el = document.getElementById("liveBanner");
  if (el) el.remove();
}

// ---- Display (mirror) ----
async function connectAsDisplay(code) {
  live.role = "display";
  live.code = code;
  document.body.classList.add("display-mode");
  try { localStorage.setItem(TV_ROOM_KEY, code); } catch (e) {}   // remember for refresh

  if (!liveConfigured()) {
    main.innerHTML =
      '<div class="view"><h2 style="color:var(--yellow)">Live screens not set up</h2>' +
      '<p style="color:var(--cream)">This file has no Supabase keys, so it can\'t join room <b>' +
      escapeHtml(code) + '</b>.</p></div>';
    return;
  }

  const sb = liveClient();
  showDisplayTag();
  mountTvChrome();

  // Load whatever the room is currently showing.
  try {
    const { data } = await sb.from(LIVE_TABLE).select("*").eq("room_code", code).maybeSingle();
    if (data) applyRemote(data);
    else showDisplayWaiting();
  } catch (e) { showDisplayWaiting(); }

  // Then live-subscribe to every change the host makes.
  live.channel = sb.channel("room-" + code)
    .on("postgres_changes",
        { event: "*", schema: "public", table: LIVE_TABLE, filter: "room_code=eq." + code },
        (payload) => { if (payload.new) applyRemote(payload.new); })
    .subscribe();
}

// ---- Phone PLAYER mode (?play=CODE) ---------------------------------------
// A player opens ?play=CODE on their phone (from the host's QR), follows the
// host's current question over the SAME live channel a TV uses, and submits an
// answer. Submissions are written back to the SAME `sessions` table under a
// player-scoped room_code ("<CODE>__p__<uid>") — no new table/RLS needed; the
// host scores by reading rows where room_code like "<CODE>__p__%".
const PLAYER_UID_KEY = "pluckers-player-uid";
const player = { code: null, uid: "", team: "", answers: {}, draft: "", submittedCursor: -1 };

function playerUid() {
  try {
    let u = localStorage.getItem(PLAYER_UID_KEY);
    if (!u) { u = "p" + Math.random().toString(36).slice(2, 9); localStorage.setItem(PLAYER_UID_KEY, u); }
    return u;
  } catch (e) { return "p" + Math.random().toString(36).slice(2, 9); }
}
function playerTeamKey() { return "pluckers-player-team-" + (player.code || ""); }

async function connectAsPlayer(code) {
  live.role = "player"; live.code = code;
  player.code = code; player.uid = playerUid();
  try { player.team = localStorage.getItem(playerTeamKey()) || ""; } catch (e) {}
  document.body.classList.add("player-mode");

  if (!liveConfigured()) {
    main.innerHTML = '<div class="pl-wrap"><div class="pl-team">Can\'t join</div>' +
      '<div class="pl-wait">This link has no live connection set up.</div></div>';
    return;
  }
  const sb = liveClient();
  // Load the room's current screen, then live-subscribe to the host's changes.
  try {
    const { data } = await sb.from(LIVE_TABLE).select("*").eq("room_code", code).maybeSingle();
    if (data) applyRemotePlayer(data); else renderPlayer();
  } catch (e) { renderPlayer(); }

  live.channel = sb.channel("play-" + code)
    .on("postgres_changes",
        { event: "*", schema: "public", table: LIVE_TABLE, filter: "room_code=eq." + code },
        (payload) => { if (payload.new) applyRemotePlayer(payload.new); })
    .subscribe();
}

// Mirror just enough of the host's state to show the right question + brand.
function applyRemotePlayer(row) {
  if (Array.isArray(row.rounds) && row.rounds.length) { ROUNDS = row.rounds; buildSchedule(); }
  try {
    const ex = JSON.parse(row.state);
    if (ex && typeof ex === "object") {
      if (ex.theme && typeof ex.theme === "object") {
        const merged = Object.assign({}, DEFAULT_THEME, ex.theme);
        if (ex.designId) {   // lite pushes strip heavy assets — keep what the design link already loaded
          if (!merged.logo && THEME.logo) merged.logo = THEME.logo;
          if (!merged.bgimg && THEME.bgimg) merged.bgimg = THEME.bgimg;
          if (THEME.fontFaces && !(merged.fontFaces && merged.fontFaces.length)) merged.fontFaces = THEME.fontFaces;
          if (merged.screens && THEME.screens) Object.keys(merged.screens).forEach(k => { const a = merged.screens[k], b = THEME.screens[k]; if (a && b && !a.bgimg && b.bgimg) a.bgimg = b.bgimg; });
        }
        THEME = merged; applyTheme(THEME);
      }
      if (ex.designId && ex.designId !== LIVE_DESIGN_ID) loadDesign(ex.designId);   // pulls full brand (logo/bg/fonts)
    }
  } catch (e) {}
  if (SCHEDULE.length) {
    game.cursor = Math.max(0, Math.min((row.question_idx | 0), SCHEDULE.length - 1));
    applyFrame(SCHEDULE[game.cursor]);
  }
  renderPlayer();
}

function currentQuestionObj() {
  const round = ROUNDS[game.roundIdx];
  if (!round || !round.questions) return null;
  const q = round.questions[game.questionIdx];
  if (q == null) return null;
  return typeof q === "string" ? { q: q, a: "" } : q;
}

function plLogoBlock() {
  const src = brandLogoSrc();
  return src ? '<img class="pl-logo" src="' + escapeHtml(src) + '" alt="" />' : '';
}

function renderPlayer() {
  if (!main) return;
  if (!player.team) { main.innerHTML = playerJoinHTML(); wirePlayerJoin(); return; }
  if (game.state === State.QUESTION) { main.innerHTML = playerQuestionHTML(); wirePlayerQuestion(); return; }
  main.innerHTML = playerWaitHTML();
}

function playerJoinHTML() {
  return '<div class="pl-wrap">' + plLogoBlock() +
    '<div class="pl-prompt">Room ' + escapeHtml(player.code || "") + '</div>' +
    '<div class="pl-q">What\'s your team name?</div>' +
    '<input id="plName" class="pl-name" maxlength="28" placeholder="Team name" autocomplete="off" />' +
    '<button id="plJoin" class="pl-btn">JOIN</button>' +
    '</div>';
}
function wirePlayerJoin() {
  const inp = document.getElementById("plName");
  const btn = document.getElementById("plJoin");
  function doJoin() {
    const v = cleanProfanity(((inp && inp.value) || "").trim());   // filter bad words out of the team name
    if (!v) { if (inp) inp.focus(); return; }
    player.team = v;
    try { localStorage.setItem(playerTeamKey(), v); } catch (e) {}
    submitPlayerAnswers();   // register presence so the host's tracker sees the team right away
    renderPlayer();
  }
  if (inp) { inp.value = player.team || ""; inp.focus();
    inp.addEventListener("keydown", e => { if (e.key === "Enter") doJoin(); }); }
  if (btn) btn.addEventListener("click", doJoin);
}

function playerQuestionHTML() {
  const q = currentQuestionObj();
  const round = ROUNDS[game.roundIdx] || {};
  const cat = round.category ? escapeHtml(round.category) : "";
  if (player.submittedCursor === game.cursor) {
    return '<div class="pl-wrap">' + plLogoBlock() +
      '<div class="pl-team">' + escapeHtml(player.team) + '</div>' +
      '<div class="pl-ok">Answer locked in</div>' +
      '<div class="pl-locked">You said: <b>' + escapeHtml(player.answers[game.cursor] || "") + '</b></div>' +
      '<div class="pl-sub">Waiting for the next question…</div>' +
      '</div>';
  }
  return '<div class="pl-wrap">' + plLogoBlock() +
    '<div class="pl-team">' + escapeHtml(player.team) + (cat ? ' · ' + cat : '') + '</div>' +
    '<div class="pl-qnum">Question ' + (game.questionIdx + 1) + '</div>' +
    '<div class="pl-q">' + escapeHtml(q ? q.q : "") + '</div>' +
    '<input id="plAns" class="pl-input" placeholder="Your answer" autocomplete="off" />' +
    '<button id="plSend" class="pl-btn">SUBMIT</button>' +
    '</div>';
}
function wirePlayerQuestion() {
  const inp = document.getElementById("plAns");
  const btn = document.getElementById("plSend");
  function send() {
    const v = ((inp && inp.value) || "").trim();
    if (!v) { if (inp) inp.focus(); return; }
    player.answers[game.cursor] = v;
    player.draft = "";
    player.submittedCursor = game.cursor;
    submitPlayerAnswers();
    renderPlayer();
  }
  if (inp) { inp.value = player.draft || ""; inp.focus();
    inp.addEventListener("input", () => { player.draft = inp.value; });
    inp.addEventListener("keydown", e => { if (e.key === "Enter") send(); }); }
  if (btn) btn.addEventListener("click", send);
}

function playerWaitHTML() {
  let msg = "Waiting for the next question…";
  if (game.state === State.TITLE) msg = "You're in! The game is about to start.";
  else if (game.state === State.ROUND_INTRO) { const r = ROUNDS[game.roundIdx]; msg = "Next up: " + ((r && r.category) ? r.category : "a new round") + "."; }
  else if (game.state === State.TURN_IN) msg = "Pencils down! Answers are coming up.";
  else if (game.state === State.ANSWER) msg = "Answers are on the big screen.";
  else if (game.state === State.FINAL_BOARD) msg = "Check the standings on the big screen!";
  else if (game.state === State.WINNER) msg = "And the winner is… look up!";
  else if (game.state === State.END) msg = "That's a wrap — thanks for playing!";
  return '<div class="pl-wrap">' + plLogoBlock() +
    '<div class="pl-team">' + escapeHtml(player.team) + '</div>' +
    '<div class="pl-wait">' + msg + '</div></div>';
}

// Write/refresh this player's submission row (team + every answer so far).
async function submitPlayerAnswers() {
  if (!player.code || !liveConfigured()) return;
  try {
    await liveClient().from(LIVE_TABLE).upsert({
      room_code: player.code + "__p__" + player.uid,
      state: JSON.stringify({ team: player.team, uid: player.uid, answers: player.answers }),
      updated_at: new Date().toISOString()
    }, { onConflict: "room_code" });
  } catch (e) {}
}

// ---- Host-side: collect phone submissions + AUTO-GRADE into the leaderboard ----
// The host polls every player's submission row (room_code "<CODE>__p__<uid>"),
// grades each answer against the question's stored answer, and rebuilds TEAMS so
// the existing STANDINGS / WINNER screens (and the TV mirror) reflect live scores.
const hostPlayers = {};        // uid -> { team, answers:{cursor:answerText} }
let hostPoll = null;
let lastStandingsKey = "";

function startPlayerWatch() {
  stopPlayerWatch();
  if (!liveConfigured() || !live.code) return;
  hostPoll = setInterval(refreshPlayers, 3000);
  refreshPlayers();
}
function stopPlayerWatch() { if (hostPoll) { clearInterval(hostPoll); hostPoll = null; } }

async function refreshPlayers() {
  if (live.role !== "host" || !live.code) return;
  try {
    const { data } = await liveClient().from(LIVE_TABLE).select("room_code,state").like("room_code", live.code + "__p__%");
    if (!Array.isArray(data)) return;
    // Rebuild from THIS poll so hostPlayers reflects only the current room — nothing lingers.
    const next = {};
    data.forEach(row => { try { const s = JSON.parse(row.state); if (s && s.uid) next[s.uid] = { team: s.team || "", answers: s.answers || {} }; } catch (e) {} });
    Object.keys(hostPlayers).forEach(k => delete hostPlayers[k]);
    Object.assign(hostPlayers, next);
    recomputeScores();
    updatePlayerTracker();
    // Push refreshed scores to the TVs only when the standings actually change.
    const key = JSON.stringify(standings());
    if (key !== lastStandingsKey) {
      lastStandingsKey = key;
      try { await liveClient().from(LIVE_TABLE).upsert(snapshot()); } catch (e) {}
    }
  } catch (e) {}
}

// Forgiving normalize for open-ended answers (case/accents/punctuation/articles).
function normAns(s) {
  return String(s == null ? "" : s).toLowerCase()
    .normalize("NFKD").replace(/[̀-ͯ]/g, "")
    .replace(/[^\w\s]/g, " ")
    .replace(/\b(the|a|an)\b/g, " ")
    .replace(/\s+/g, " ").trim();
}
function isCorrect(playerAns, correctAns) {
  const p = normAns(playerAns), c = normAns(correctAns);
  if (!p || !c) return false;
  if (p === c) return true;
  const core = normAns(String(correctAns).split("(")[0]);   // "spicy heat (capsaicin)" -> "spicy heat"
  if (core && p === core) return true;
  if (c.includes(p) && p.length >= 3) return true;           // player gave the key word(s)
  if (p.includes(c) && c.length >= 2) return true;           // player wrote more, but it's in there
  return false;
}
function correctAnswerAtCursor(c) {
  const f = SCHEDULE[c];
  if (!f || f.state !== State.QUESTION) return null;
  const r = ROUNDS[f.roundIdx]; if (!r || !r.questions) return null;
  const q = r.questions[f.questionIdx]; if (q == null) return null;
  return typeof q === "string" ? "" : (q.a || "");
}
function recomputeScores() {
  const byTeam = {};
  Object.keys(hostPlayers).forEach(uid => {
    const p = hostPlayers[uid]; const name = cleanProfanity((p.team || "").trim()); if (!name) return;   // re-filter on display (defense in depth)
    if (byTeam[name] == null) byTeam[name] = 0;
    const ans = p.answers || {};
    Object.keys(ans).forEach(cstr => {
      const correct = correctAnswerAtCursor(+cstr);
      if (correct != null && correct !== "" && isCorrect(ans[cstr], correct)) byTeam[name] += 1;
    });
  });
  // Only auto-manage TEAMS once phones are actually in play (don't wipe manual scores).
  if (Object.keys(byTeam).length) {
    TEAMS = Object.keys(byTeam).map(name => ({ name: name, score: byTeam[name] }));
    saveTeams();
  }
}

function answeredCountForCursor(c) {
  let n = 0;
  Object.keys(hostPlayers).forEach(uid => { const a = hostPlayers[uid].answers || {}; if (a[c] != null && String(a[c]).trim() !== "") n++; });
  return n;
}
function playerCount() { return Object.keys(hostPlayers).filter(uid => (hostPlayers[uid].team || "").trim()).length; }

// Phone version only: a persistent "scan to play" QR in the top-right of the
// question screen (shown on the TV + host) so players can join + answer on their
// phones at any time. Hidden for the paper version and on non-question screens.
function renderJoinQr() {
  const existing = document.getElementById("joinQr");
  const show = THEME.mode === "phone" && live.code && game.state === State.QUESTION;
  if (!show) { if (existing) existing.remove(); return; }
  let el = existing;
  if (!el) { el = document.createElement("div"); el.id = "joinQr"; stageEl().appendChild(el); }
  if (el.dataset.code === live.code) return;   // already built for this room — don't regenerate every render
  el.dataset.code = live.code;
  el.innerHTML = '<div class="joinqr-label">SCAN TO PLAY</div><div class="joinqr-box" id="joinQrBox"></div>';
  const box = document.getElementById("joinQrBox");
  if (!box) return;
  if (isLocalUrl()) { box.innerHTML = '<div class="joinqr-local">Publish online so phones can scan</div>'; return; }
  if (typeof QRCode !== "undefined") { try { new QRCode(box, { text: playUrl(), width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M }); } catch (e) { box.innerHTML = ""; } }
}

// A small host-only panel showing how many phones joined / answered the current Q.
function updatePlayerTracker() {
  let el = document.getElementById("playerTracker");
  if (live.role !== "host") { if (el) el.remove(); return; }
  if (!el) { el = document.createElement("div"); el.id = "playerTracker"; document.body.appendChild(el); }
  const joined = playerCount();
  let line2 = "";
  if (game.state === State.QUESTION) line2 = '<span class="pt-ans">' + answeredCountForCursor(game.cursor) + ' / ' + joined + ' answered</span>';
  el.innerHTML = '<span class="pt-join">' + joined + ' player' + (joined === 1 ? '' : 's') + ' joined</span>' + line2;
}

function applyRemote(row) {
  live.applying = true;
  if (Array.isArray(row.rounds) && row.rounds.length) { ROUNDS = row.rounds; buildSchedule(); }
  // The `state` field carries the timer alongside the screen name.
  try {
    const ex = JSON.parse(row.state);
    if (ex && typeof ex === "object") {
      if (typeof ex.timerSecs === "number") TIMER_SECS = ex.timerSecs;
      TIMER_END = ex.timerEnd || 0;
      if (ex.lb && typeof ex.lb === "object") {
        if (Array.isArray(ex.lb.teams)) TEAMS = ex.lb.teams.map(t => ({ name: String(t.name || ""), score: Number(t.score) || 0 }));
        LB_SHOWN = !!ex.lb.shown;
      }
      if (ex.theme && typeof ex.theme === "object") {
        const merged = Object.assign({}, DEFAULT_THEME, ex.theme);   // mirror the host's brand (colors/fonts/bg style)
        // The live push strips the heavy assets (logo / background image / uploaded fonts)
        // to stay small — keep the ones the design link already loaded so they aren't
        // wiped on every state update.
        if (ex.designId) {
          if (!merged.logo && THEME.logo) merged.logo = THEME.logo;
          if (!merged.bgimg && THEME.bgimg) merged.bgimg = THEME.bgimg;
          if (THEME.fontFaces && !(merged.fontFaces && merged.fontFaces.length)) merged.fontFaces = THEME.fontFaces;
          if (merged.screens && THEME.screens) Object.keys(merged.screens).forEach(k => { const a = merged.screens[k], b = THEME.screens[k]; if (a && b && !a.bgimg && b.bgimg) a.bgimg = b.bgimg; });
        }
        THEME = merged;
        applyTheme(THEME);
      }
      // Full brand (logo, background image, uploaded fonts, custom layout) loads once
      // from the design link — they're too big to push on every state change.
      if (ex.designId && ex.designId !== LIVE_DESIGN_ID) loadDesign(ex.designId);
    }
  } catch (e) { /* older/plain state string — ignore */ }
  game.cursor = Math.max(0, Math.min((row.question_idx | 0), SCHEDULE.length - 1));
  applyFrame(SCHEDULE[game.cursor]);
  live.applying = false;
  render();
  updateLeaderboardOverlay();   // show/refresh/hide the published leaderboard on this TV
}

function showDisplayTag() {
  let el = document.getElementById("displayTag");
  if (!el) { el = document.createElement("div"); el.id = "displayTag"; stageEl().appendChild(el); }
  el.textContent = "MIRRORING • ROOM " + live.code;
  el.title = "Click to change room";
  el.style.cursor = "pointer";
  el.onclick = function () {
    if (confirm("Change room? This screen will ask for a new code.")) {
      try { localStorage.removeItem(TV_ROOM_KEY); } catch (e) {}
      location.href = location.origin + location.pathname + "?tv";
    }
  };
}

// Inject the always-on TV chrome: a WIN PRIZES badge (left) + Instructions (right).
// Both live in #app, outside <main>, so they persist across question re-renders.
function mountTvChrome() {
  const app = document.getElementById("app");

  if (!document.getElementById("tvWinPrizes")) {
    const wp = document.createElement("div");
    wp.id = "tvWinPrizes";
    wp.className = "win-prizes";
    wp.innerHTML =
      '<span class="wp-top">WIN</span>' +
      '<span class="wp-big">PRIZES!</span>';
    app.appendChild(wp);
  }

  if (!document.getElementById("tvInstructions")) {
    const ins = document.createElement("div");
    ins.id = "tvInstructions";
    ins.className = "instructions";
    ins.innerHTML =
      '<div class="instr-header">INSTRUCTIONS</div>' +
      '<ol class="instr-list">' +
        '<li><b>Grab an answer sheet.</b></li>' +
        '<li>Write each answer in its <b>numbered box.</b></li>' +
        '<li>Turn it in after each round.</li>' +
        '<li><b>Host announces the winners!</b></li>' +
      '</ol>';
    app.appendChild(ins);
  }

  if (!document.getElementById("lbOverlay")) {
    const ov = document.createElement("div");
    ov.id = "lbOverlay";
    stageEl().appendChild(ov);   // full-screen takeover when the host publishes
  }
}

// Show/hide + populate the published leaderboard on a TV. Called when remote
// state arrives. Renders nothing unless the host has published it.
function updateLeaderboardOverlay() {
  const ov = document.getElementById("lbOverlay");
  if (!ov) return;
  // The full-screen board/winner take over completely — never show the banner there.
  const finale = (game.state === State.FINAL_BOARD || game.state === State.WINNER);
  if (!LB_SHOWN || finale) { ov.classList.remove("show"); return; }
  const medals = ["1", "2", "3"];
  const rows = standings().slice(0, 3).map((t, i) =>   // top 3 only
    '<div class="lbo-row' + (i === 0 ? ' lbo-first' : '') + '">' +
      '<span class="lbo-rank">' + medals[i] + '</span>' +
      '<span class="lbo-name">' + escapeHtml(t.name) + '</span>' +
      '<span class="lbo-score">' + t.score + '</span>' +
    '</div>'
  ).join("");
  ov.innerHTML =
    '<div class="lbo-card">' +
      '<div class="lbo-list">' + (rows || '<div class="lbo-empty">No teams yet</div>') + '</div>' +
    '</div>';
  ov.classList.add("show");
}

// Host-only scoreboard manager: enter team names + scores, then publish to TVs.
function openScoreboardModal() {
  const root = document.getElementById("modalRoot");
  function statusHtml() {
    return LB_SHOWN
      ? '<span style="color:#2ed573;font-weight:800">● Showing on the TVs</span>'
      : '<span style="color:#9fb6c8">Hidden from the TVs</span>';
  }
  function rowsHtml() {
    if (!TEAMS.length) return '<p class="sb-empty">No teams yet — add one below.</p>';
    return TEAMS.map((t, i) =>
      '<div class="sb-row">' +
        '<input class="sb-name" data-i="' + i + '" value="' + escapeHtml(t.name) + '" placeholder="Team name" />' +
        '<input class="sb-score" type="number" inputmode="numeric" data-i="' + i + '" value="' + t.score + '" />' +
        '<button class="sb-del" data-i="' + i + '" title="Remove">×</button>' +
      '</div>'
    ).join("");
  }
  function draw() {
    root.innerHTML =
      '<div class="modal-backdrop" id="loadModal">' +
        '<div class="modal" role="dialog" aria-label="Scoreboard">' +
          '<button class="close-x" id="closeX" aria-label="Close">×</button>' +
          '<h2>Scoreboard</h2>' +
          '<p class="modal-lead">Enter team names and scores. Press <b>PUBLISH</b> to show the leaderboard on the TVs (press again anytime to refresh it). <b>HIDE</b> takes it back off.</p>' +
          '<div class="sb-status">' + statusHtml() + '</div>' +
          '<div id="sbRows" class="sb-rows">' + rowsHtml() + '</div>' +
          '<button class="btn secondary" id="sbAdd" style="margin-top:6px">+ Add team</button>' +
          '<div class="modal-actions">' +
            '<button class="btn secondary" id="sbHide">HIDE FROM TVs</button>' +
            '<button class="btn" id="sbPublish">PUBLISH TO TVs</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    wire();
  }
  function wire() {
    document.getElementById("closeX").addEventListener("click", closeLoadModal);
    document.getElementById("sbAdd").addEventListener("click", function () {
      TEAMS.push({ name: "", score: 0 }); saveTeams(); draw();
      const last = root.querySelector('.sb-name[data-i="' + (TEAMS.length - 1) + '"]');
      if (last) last.focus();
    });
    document.getElementById("sbPublish").addEventListener("click", function () {
      LB_SHOWN = true; saveTeams();
      if (live.role === "host") pushState();
      draw();
    });
    document.getElementById("sbHide").addEventListener("click", function () {
      LB_SHOWN = false;
      if (live.role === "host") pushState();
      draw();
    });
    root.querySelectorAll(".sb-name").forEach(function (inp) {
      inp.addEventListener("input", function () { TEAMS[+inp.dataset.i].name = inp.value; saveTeams(); });
    });
    root.querySelectorAll(".sb-score").forEach(function (inp) {
      inp.addEventListener("input", function () { TEAMS[+inp.dataset.i].score = Number(inp.value) || 0; saveTeams(); });
    });
    root.querySelectorAll(".sb-del").forEach(function (btn) {
      btn.addEventListener("click", function () { TEAMS.splice(+btn.dataset.i, 1); saveTeams(); draw(); });
    });
  }
  draw();
}

// On TVs, show the WIN PRIZES badge + Instructions panel only on the title +
// round-intro screens (hidden during questions / answers so content stays clear).
function updateTvChromeVisibility() {
  if (!document.body.classList.contains("display-mode")) return;
  const s = game.state;
  const show = (s === State.TITLE || s === State.ROUND_INTRO);
  const finale = (s === State.FINAL_BOARD || s === State.WINNER);
  const wp  = document.getElementById("tvWinPrizes");
  const ins = document.getElementById("tvInstructions");
  const tag = document.getElementById("displayTag");
  if (wp)  wp.style.display  = show ? "" : "none";
  if (ins) ins.style.display = show ? "" : "none";
  if (tag) tag.style.display = finale ? "none" : "";   // nothing over the full-screen finale
}
function showDisplayWaiting() {
  main.innerHTML =
    '<div class="view"><h2 style="color:var(--yellow)">Waiting for the host…</h2>' +
    '<p style="color:var(--cream)">Room <b>' + escapeHtml(live.code) + '</b> isn\'t live yet.<br>' +
    'This screen updates automatically when the host presses GO LIVE.</p></div>';
}

// TV setup screen: shown on the permanent ?tv link so staff just type the
// 4-character code from the host screen (no long URL to type each session).
function showCodeEntry() {
  document.body.classList.add("display-mode");
  main.innerHTML =
    '<div class="view code-entry">' +
      '<h2 class="ce-title">ENTER ROOM CODE</h2>' +
      '<p class="ce-sub">Get the code from the host\'s screen</p>' +
      '<input id="ceInput" class="ce-input" maxlength="4" autocomplete="off" ' +
        'autocapitalize="characters" spellcheck="false" placeholder="• • • •" />' +
      '<button class="btn" id="ceGo">WATCH GAME</button>' +
      '<p id="ceErr" class="ce-err"></p>' +
    '</div>';
  const inp = document.getElementById("ceInput");
  const go = () => {
    const code = (inp.value || "").trim().toUpperCase();
    if (code.length < 3) {
      document.getElementById("ceErr").textContent = "Enter the code shown on the host screen.";
      inp.focus();
      return;
    }
    connectAsDisplay(code);
  };
  document.getElementById("ceGo").addEventListener("click", go);
  inp.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
  inp.focus();
}

// Demo / preview of the TV point-of-view: no host, no Supabase, no code entry.
// Auto-cycles through the TV screens using the built-in sample questions.
function startDemo() {
  document.body.classList.add("display-mode");
  mountTvChrome();
  let tag = document.getElementById("displayTag");
  if (!tag) { tag = document.createElement("div"); tag.id = "displayTag"; stageEl().appendChild(tag); }
  tag.textContent = "TV PREVIEW (DEMO)";

  TIMER_SECS = 30;
  TEAMS = [{ name: "The Wingers", score: 42 }, { name: "Cluckers", score: 38 }, { name: "Sauce Bosses", score: 31 }, { name: "Drumstick Dynasty", score: 27 }];
  const steps = [
    { d: 3500, fn: () => { LB_SHOWN = false; game.state = State.TITLE; } },
    { d: 3000, fn: () => { game.state = State.ROUND_INTRO; game.roundIdx = 0; game.questionIdx = 0; } },
    { d: 5000, fn: () => { game.state = State.QUESTION; game.roundIdx = 0; game.questionIdx = 0; TIMER_END = Date.now() + 30000; } },
    { d: 3500, fn: () => { game.state = State.TURN_IN; game.roundIdx = 0; TIMER_END = 0; } },
    { d: 3000, fn: () => { game.state = State.ROUND_INTRO; game.roundIdx = 1; game.questionIdx = 0; } },
    { d: 4500, fn: () => { game.state = State.QUESTION; game.roundIdx = 1; game.questionIdx = 4; TIMER_END = Date.now() + 30000; } },
    { d: 4500, fn: () => { game.state = State.TURN_IN; game.roundIdx = 1; TIMER_END = 0; } },
    { d: 5000, fn: () => { game.state = State.ANSWER; game.roundIdx = 1; game.questionIdx = 0; } },
    { d: 4500, fn: () => { game.state = State.FINAL_BOARD; game.isFinal = false; game.roundIdx = 0; } },  // after-round standings
    { d: 4500, fn: () => { game.state = State.WINNER; game.isFinal = false; game.roundIdx = 0; } },        // round leader
    { d: 5000, fn: () => { game.state = State.FINAL_BOARD; game.isFinal = true; } },                       // all-time top 3
    { d: 6000, fn: () => { game.state = State.WINNER; game.isFinal = true; } },                            // champion
  ];
  let i = 0;
  (function tick() {
    steps[i].fn();
    render();
    updateLeaderboardOverlay();
    const wait = steps[i].d;
    i = (i + 1) % steps.length;
    setTimeout(tick, wait);
  })();
}

buildSchedule();

// Host scoreboard button (in the header; hidden on TVs via CSS).
(function () {
  const sb = document.getElementById("scoreBtn");

})();

// Flow:
//   Host:  open the bare link → name the location → GO LIVE (pops a TV window).
//   TV:    the GO LIVE window opens …/?tv&room=NAME automatically.
//   (?room=NAME still direct-hosts a fixed room for power users.)
const _params = new URLSearchParams(location.search);
// The tool's FRONT DOOR is the builder (make.html). This engine only runs when it has a
// job to do — host/show a design, mirror a TV, run a phone player, or a demo. A bare
// visit (no such param) opens the builder instead of a default (Pluckers-looking) game.
const _hasJob = _params.has("design") || _params.has("tv") || _params.has("screen")
  || _params.has("play") || _params.has("room") || _params.has("demo")
  || location.hash.indexOf("design=") !== -1;
if (!_hasJob) {
  // Build the builder URL from the current directory (robust whether the path ends in
  // "/", "/index.html", or has no trailing slash).
  var _dir = location.pathname.replace(/index\.html?$/i, "");
  if (_dir.charAt(_dir.length - 1) !== "/") _dir += "/";
  // Preserve the hash so a magic-link landing here (…#access_token=…) carries the session
  // through to the builder instead of dropping it.
  location.replace(_dir + "make.html" + location.hash);   // → the builder ("the tool")
} else {
  const _isTv = _params.has("tv") || _params.has("screen");
  const _room = _params.get("room");
  const _play = _params.get("play");
  loadDesign();   // apply a custom freeform design (?design=id) before first render
  if (_params.has("demo")) {
    startDemo();                                 // TV point-of-view preview (no setup)
  } else if (_play) {
    connectAsPlayer(_play.toUpperCase());        // phone player — joins a room, answers on their phone
  } else if (_isTv) {
    connectAsDisplay((_room || "MAIN").toUpperCase());   // TV window — mirrors its game
  } else if (_room) {
    autoHost(_room.toUpperCase());               // power user: direct-host a fixed name
  } else {
    resetHostSession();                          // a published-design host link → clean host title with that design
    render();
  }
}

// If the host window itself is closed, free the name right away.
window.addEventListener("beforeunload", () => {
  if (live.role === "host" && live.code) {
    try { liveClient().from(LIVE_TABLE).update({ updated_at: new Date(0).toISOString() }).eq("room_code", live.code); } catch (e) {}
  }
});

function fmtTimer(secs) { return secs >= 60 ? (Math.floor(secs / 60) + ":" + String(secs % 60).padStart(2, "0")) : String(secs); }
// Phone version (host only): advance when everyone answered or the deadline passes.
function autoAdvanceTick() {
  if (!phoneHostAuto() || !AUTO_DEADLINE) return;
  let go = Date.now() >= AUTO_DEADLINE;
  if (!go && game.state === State.QUESTION) {
    const joined = playerCount();
    if (joined > 0 && answeredCountForCursor(game.cursor) >= joined) go = true;   // everyone's in → move on
  }
  if (go) { AUTO_DEADLINE = 0; advance(); }
}
// Tick the question countdown timer (updates any visible .q-timer each second).
setInterval(() => {
  const el = document.getElementById("qTimer");
  if (el && TIMER_END) {
    const left = Math.max(0, Math.ceil((TIMER_END - Date.now()) / 1000));
    el.textContent = left > 0 ? fmtTimer(left) : "TIME!";
    el.classList.toggle("q-timer-up", left <= 0);
  }
  autoAdvanceTick();
}, 250);
</script>
